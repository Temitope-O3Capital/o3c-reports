<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O3 Capital Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Material Symbols self-hosted: eliminates Google CDN round-trip and FOUT -->
    <link rel="preload" href="/fonts/material-symbols-rounded.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: "Material Symbols Rounded";
        font-style: normal;
        font-weight: 100 700;
        font-display: block;
        src: url("/fonts/material-symbols-rounded.woff2") format("woff2");
      }
      .material-symbols-rounded {
        font-family: "Material Symbols Rounded";
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-feature-settings: "liga";
      }
    </style>
  </head>
  <body>
    <script>
      ;(function(){
        var t=localStorage.getItem('o3c_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')
        if(t==='dark'){
          var r=document.documentElement.style
          r.setProperty('--bg','#0E1722');r.setProperty('--card','#131F2D')
          r.setProperty('--txt','#E8EDF2');r.setProperty('--txt2','#9FB0C0');r.setProperty('--txt3','#64788C')
          r.setProperty('--bdr','#22303F');r.setProperty('--row-hvr','#182635')
          r.setProperty('--topbar-bg','#131F2D');r.setProperty('--input-bg','#131F2D');r.setProperty('--input-bdr','#22303F')
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
