name: Deploy

# Required Railway env vars (set in Railway dashboard, not here):
#   SECRET_KEY         - JWT signing secret (32+ chars, generate: openssl rand -hex 32)
#   ENCRYPTION_KEY     - Must be exactly 32 bytes
#   DATABASE_URL       - Supabase PostgreSQL connection string
#   ALLOWED_ORIGINS    - Comma-separated list of allowed CORS origins
#   RESET_ADMIN_SECRET - Separate secret for /api/auth/reset-admin (set only when resetting)
#   ENABLE_RESET_ADMIN - Set to "true" only when actively resetting a password, then remove
#
# Required GitHub secrets (set in repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token with Pages:Edit permission
#   CF_ACCOUNT_ID         - Cloudflare account ID (never hardcode this)

on:
  push:
    branches: [main]

jobs:
  # ── Frontend → Cloudflare Pages ─────────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://o3c-reports-production.up.railway.app

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name o3c-reports
          workingDirectory: frontend
