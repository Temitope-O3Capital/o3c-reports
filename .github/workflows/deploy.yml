name: Deploy

# Required Railway env vars (set in Railway dashboard, not here):
#   SECRET_KEY         - JWT signing secret (32+ chars, generate: openssl rand -hex 32)
#   ENCRYPTION_KEY     - Must be exactly 32 bytes
#   DATABASE_URL       - Supabase PostgreSQL connection string
#   ALLOWED_ORIGINS    - Comma-separated list of allowed CORS origins
#   RESET_ADMIN_SECRET - Separate secret for /api/auth/reset-admin (set only when resetting)
#   ENABLE_RESET_ADMIN - Set to "true" only when actively resetting a password, then remove
#
# Required GitHub secrets (set in repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token with Pages:Edit permission
#   CF_ACCOUNT_ID         - Cloudflare account ID (never hardcode this)
#   VITE_API_URL          - Backend Railway URL e.g. https://o3c-reports-production.up.railway.app

on:
  push:
    branches: [main]

jobs:
  # ── Quality gate — must pass before any deploy ───────────────────────────────
  test:
    name: Test & Type-check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: o3c_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # ── Go backend ──────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: backend-go/go.sum

      - name: Go tests
        run: go test ./... -v -race -timeout 120s
        working-directory: backend-go
        env:
          DATABASE_URL: postgres://postgres:testpass@localhost:5432/o3c_test
          SECRET_KEY: ci-test-secret-key-32-chars-long!!
          ENCRYPTION_KEY: ci-test-encr-key-32-chars-long!!

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: backend-go

      # ── Frontend ────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

  # ── Frontend → Cloudflare Pages ─────────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name o3c-workspace
          workingDirectory: frontend
